<header class="site-header">
    <a class="brand" href="{% url 'shop:home' %}">Футбол Маркет</a>
    <nav class="nav" aria-label="Основная навигация">
        <a href="{% url 'shop:home' %}">Главная</a>
        <a href="{% url 'shop:about' %}">О компании</a>
        <a href="{% url 'shop:product_list' %}">Товары</a>
        <a href="{% url 'shop:category_list' %}">Категории</a>
        <a href="{% url 'shop:club_list' %}">Клубы</a>
        <a href="{% url 'shop:brand_list' %}">Бренды</a>
        <a href="{% url 'shop:supplier_list' %}">Поставщики</a>
        {% if user.is_authenticated %}
            <a href="{% url 'shop:order_list' %}">Заказы</a>
        {% endif %}
        <a class="cart-link" href="{% url 'shop:cart' %}">Корзина</a>
        {% if user.is_authenticated %}
            <form method="post" action="{% url 'shop:logout' %}" class="nav-form">
                {% csrf_token %}
                <button type="submit" class="nav-button">Выход</button>
            </form>
        {% else %}
            <a href="{% url 'shop:login' %}">Авторизация</a>
            <a href="{% url 'shop:register' %}">Регистрация</a>
        {% endif %}
    </nav>
</header>
